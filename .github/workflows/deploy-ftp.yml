name: Deploy to Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` = sitemap.xml + robots.txt + tsc + prerender static (vite-react-ssg)
      - name: Build app (sitemap + prerender)
        run: npm run build

      - name: Ensure .htaccess is in dist
        run: cp public/.htaccess dist/.htaccess

      - name: Inject SMTP password into contact.php
        env:
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          if [ -n "$MAIL_PASSWORD" ] && [ -f dist/contact.php ]; then
            esc=$(printf '%s' "$MAIL_PASSWORD" | sed -e 's/[\/&|]/\\&/g')
            sed -i "s|__MAIL_PASSWORD__|$esc|" dist/contact.php
            echo "SMTP password injected into contact.php"
          else
            echo "::warning::MAIL_PASSWORD missing — formularul de contact nu va putea trimite."
          fi

      - name: Check FTP secrets
        id: ftp-secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -n "$FTP_SERVER" ] && [ -n "$FTP_USERNAME" ] && [ -n "$FTP_PASSWORD" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secretele FTP lipsesc. Upload-ul în cPanel a fost sărit."
          fi

      - name: Upload dist to hosting (public_html)
        if: steps.ftp-secrets.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /
          # Nu șterge fișierele preexistente de care nu știe acțiunea.
          dangerous-clean-slate: false

      - name: FTP upload skipped
        if: steps.ftp-secrets.outputs.configured != 'true'
        run: echo "Upload FTP sărit — secretele FTP_SERVER / FTP_USERNAME / FTP_PASSWORD nu sunt configurate încă în GitHub."
