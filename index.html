<!doctype html>
<html lang="ro-RO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon / icoane (PNG — suport universal + Google SERP) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0E0F0D" />

    <!-- Fonturi LOCALE (GDPR-compliant, zero requesturi externe) -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/plus-jakarta-sans-400-latin.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/plus-jakarta-sans-400-latin-ext.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/playfair-display-700-latin.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/playfair-display-700-latin-ext.woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />

    <!-- Preload hero (LCP) responsive: portret pe mobil, landscape pe desktop -->
    <link
      rel="preload"
      as="image"
      href="/images/imagine_background_hero_mobil-w1080.webp"
      imagesrcset="/images/imagine_background_hero_mobil-w768.webp 768w, /images/imagine_background_hero_mobil-w1080.webp 1080w"
      imagesizes="100vw"
      media="(max-width: 767px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/images/imagine_background_hero.webp"
      imagesrcset="/images/imagine_background_hero-w1280.webp 1280w, /images/imagine_background_hero.webp 1800w"
      imagesizes="100vw"
      media="(min-width: 768px)"
      fetchpriority="high"
    />

    <!-- title + meta description sunt setate per pagină de componenta SEO (react-helmet-async). -->
    <!-- NIMIC tracking aici. GA se încarcă dinamic doar după consimțământ (vezi src/utils/analytics.ts). -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
